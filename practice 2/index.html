<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Практика 2</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="JavaScript/image.js"></script>
    <script src="JavaScript/path.js"></script>
    <script src="JavaScript/main.js"></script>
</head>
<body>
    <form id="setting">
        <div class="controls-top">
            <div class="group">
                <div class="group-title">Скорость анимации</div>
                <label for="duration">Время:</label>
                <input type="number" id="duration" value="5000">
            </div>

            <div class="group">
                <div class="group-title">Масштаб</div>
                <label for="scaleStart">от:</label>
                <input type="number" id="scaleStart" value="1">
                <br>
                <label for="scaleEnd">до:</label>
                <input type="number" id="scaleEnd" value="1.5">
            </div>

            <div class="group">
                <div class="group-title">Поворот</div>
                <label for="rotateStart">от:</label>
                <input type="number" id="rotateStart" value="0">
                <br>
                <label for="rotateEnd">до:</label>
                <input type="number" id="rotateEnd" value="360">
            </div>
        </div>

        <div class="buttons-row">
            <input type="button" id="animateBtn" value="Запустить анимацию">
            <input type="button" id="clearBtn" value="Очистить">
        </div>
    </form>

    <svg id="scene"></svg>
</body>
</html>
